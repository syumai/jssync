name = "jssync"
main = "src/worker.ts"
compatibility_date = "2024-12-18"
compatibility_flags = ["nodejs_compat"]

# Development configuration
[vars]
ENVIRONMENT = "development"

# Static assets configuration
[assets]
directory = "./public"
binding = "ASSETS"

# Durable Objects bindings
[durable_objects]
bindings = [
  { name = "JSSYNC_ROOMS", class_name = "JSSyncDurableObject" }
]

# Durable Objects migrations
[[migrations]]
tag = "v1"
new_sqlite_classes = ["JSSyncDurableObject"]

# Build configuration
[build]
command = "pnpm run build"
